<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#030308"/>
  <rect width="512" height="512" rx="80" fill="url(#grad)" opacity="0.15"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- < symbol -->
  <text x="60" y="310" font-family="monospace" font-weight="900" font-size="200" fill="#00e5ff">&lt;</text>
  <!-- FA text -->
  <text x="155" y="310" font-family="monospace" font-weight="900" font-size="200" fill="white">FA</text>
  <!-- /> symbol -->
  <text x="370" y="310" font-family="monospace" font-weight="900" font-size="200" fill="#00e5ff">/&gt;</text>
  <!-- Bottom gradient line -->
  <rect x="80" y="360" width="352" height="6" rx="3" fill="url(#grad)"/>
</svg>
